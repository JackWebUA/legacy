<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">

    <title>Legacy</title>
</head>
<body>

    <header class="header">
        <h1>Legacy</h1>
    </header>

    <section class="main">
        <div class="container">
            <div class="markers">
                <div class="marker-item anna" id="anna">
                    <div class="marker-color"></div>
                    <p class="marker-text">Anna</p>
                </div>
                <div class="marker-item juliya" id="juliya">
                    <div class="marker-color"></div>
                    <p class="marker-text">Juliya</p>
                </div>
            </div>

            <div class="objects-wrap">
                <div class="object-item apart-3">
                    <h2>Apartment 3</h2>
                    <div class="object bg-third"></div>
                </div>
                <div class="object-item apart-1">
                    <h2>Apartment 1</h2>
                    <div class="object bg-green"></div>
                </div>
                <div class="object-item house">
                    <h2>House</h2>
                    <div class="object bg-red"></div>
                </div>
                <div class="object-item money">
                    <h2>Money</h2>
                    <div class="object bg-green"></div>
                </div>
            </div>

            <div class="buttons-wrap">
                <button class="btn variant-1">Variant 1</button>
                <button class="btn variant-2">Variant 2</button>
                <button class="btn variant-3">Variant 3</button>
            </div>
        </div>
    </section>

    <script src="script.js"></script>
</body>
</html>
